<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        div.container {
            background-color: lightgreen;
            height: 100px;
            display: flex;
            flex-flow: column wrap-reverse;

        }

        div.item {
            background-color: lightblue;
            flex: auto;
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">exemplo e bloco A</div>
        <div class="item">exemplo e bloco b</div>
        <div class="item">exemplo e bloco c</div>
        <div class="item">exemplo e bloco d</div>
        <div class="item">exemplo e bloco E</div>
        <div class="item">exemplo e bloco F</div>
        <div class="item">exemplo e bloco G</div>

    </div>
</body>
</html>
