<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>

</head>

<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset style="border: 3px solid darkred; width: 450px; border-radius: 10px;">
            <legend>Teste de Formulário</legend>
            <p>
                <label for="icor">cor favorita:</label>
                <input type="color" name="cor" id="icor" value="#ff0000">
            </p>

            <p>
                <label for="inivel ">Nivel de satisfação</label>
                <input type="range" name="nivel" id="inivel" min="1" max="10" value="5">
            </p>

            <p>
                <label for="ifoto">Foto do perfil:</label>
                <input type="file" name="foto" id="ifoto">
            </p>
        </fieldset><br>

        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </form>
</body>

</html>
