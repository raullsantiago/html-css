<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>



        div.container {
            background-color: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-flow: row wrap;
            align-items: flex-start;
            height: 400px;
        }

        div.item {
            background-color: red;
            text-align: center;
            border: 1px solid black;
            padding: 50px;
            font-size: 2em;
            font-weight: bolder;
            font-family: arial; 
            margin: 15px;
        }

        div#i1 {
            align-self: flex-start;
        }

        div#i2 {
            align-self: flex-end;
        }

        div#i3 {
            align-self: center;
        }

        div#i4 {
            align-self: stretch;
        }

        div#i5 {
        
        }

        div#i6 {
            align-self: flex-end;
        }

        div#i7 {
            align-self: stretch;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">b</div>
        <div class="item" id="i3">c</div>
        <div class="item" id="i4">d</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>

    </div>
</body>
</html>
