<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fontes externas</title>
    <style>
        @font-face {
            font-family: 'texat';
            src: url('fontes/texat bold.otf') format('opentype');
            font-weight: bolder;
            font-style: normal;
        }
       
        body {
            font-family: Arial, Helvetica, sans-serif;
            
        }

        h1 {
            font-family: "texat", ' sans serif';
            font-size: 3em;
            font-weight: normal;
        }

    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Earum officia odio porro, sapiente atque nobis doloribus et voluptatibus, facilis possimus consectetur beatae. Et voluptatem consectetur numquam pariatur molestias, itaque fugit.</p>
</body>
</html>
