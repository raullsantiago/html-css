<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>

    <style>

       table {
        border-collapse: collapse;
        font-family: Arial, Helvetica, sans-serif;
       }

       thead {
        background-color: gray;
        color: white;
        padding: 10px;
       }

       td {
        text-align: center;
        width: 110px;
        padding: 05px;
       }

       th {
         padding: 10px;
       }

       th, tr, td {
        border: 2px solid black;
       }

       .gray {
        background-color: gray;
        color: white;
        padding: 10px;
       }

       
    </style>
</head>
