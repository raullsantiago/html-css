<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links personalizados</title>

    <style>
      /*  seletores personalizados
         # = id
         . = class
         : = pseudo-class
         ::= pseudo-element
         > = children
      
      */

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      a {
        color: red;
        text-decoration: none;
        font-weight: bolder;
      }

      a:visited {
        color: darkred;
      }

      a:hover {
        text-decoration: underline;
        color: rgb(250, 250, 144);
      }
    

      a:active {
        color: yellow;
      }

      .especial::before {
        content: ' → ';
      }

      .especial::after {
        content: ' ← ';
        text-decoration: none;
        font-weight: normal;
        color: darkred;
       }

       .especial {
        background-color: rgba(239, 63, 63, 0.683);
       }

       h1#links {
        text-align: center;
        color: rgba(152, 21, 21, 0.852);
        text-shadow: 2px 2px 3px rgba(149, 38, 38, 0.906);
        }

        h1#links:hover {
          text-decoration: underline;
          color: yellow;
        }

        div {
            display: inline-block;
            background-color: rgb(121, 115, 115);
            color: #8a0b0b;
            border: 2px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
            text-shadow: 2px 2px 3px #4f0606;
        }
        
        div:hover {
            background-color: yellow;
        }

        div#nome1, div#nome3, div#nome5 {
            color: #040452;
            text-shadow: 2px 2px 2px #030338;
         }

         div > p {
            display: none;
         }

         div:hover > p {
            display: block;
            background-color: yellow;
            color: red;

         } 

         

         
 </style>

</head>
<body>
    <h1 id="links">Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="next" class="especial">Repositório github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank" rel="next" class="especial">canal do youtube</a></li> 
        <li><a href="https://www.cursoemvideo.com" target="_blank" rel="next">site do curso em video</a></li>

    </ul>

   <div class="nome1" >
                Raul
            <p>33 anos</p>
   </div>
        <div class="nome2">
                    Ygor
        <p>4 anos</p>
        </div>
   <div class="nome3">
           Arthur Dio
          <p>6 anos</p>
   </div>
        <div class="nome4">
                Miguel
                <p>5 anos</p>
        </div>
   <div class="nome5">
           Helena
         <p>3 anos</p>
   </div>
        <div class="nome6">
                    Paula
                <p>35 anos</p>
   </div>
</body>
</html>
