<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>

    <style>
        h1 {
            
            height: 300px;
            width: 300px;
            background-color: aqua;

            border: 10px solid red;

            padding: 10px;

            margin: 30px auto 40px auto; 

            outline: 10px double black;

        }

        a {
            border: 10px double darkolivegreen;
            padding: 4px 5px;
        }

        

       
    </style>

</head>
<body>
    <h1>exemplo de caixa BOX LEVEL</h1>
    <p>Paragráfos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level </a> vamos ver como tudo isso funciona.</p>
    
    
</body>
</html>
