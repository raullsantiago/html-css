<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        div.container {
            background-color: lightgreen;
            display: flex;

            flex-flow: row nowrap;
        }

        div.item {
            background-color: lightblue;
            text-align: center;
            border: 1px solid black;
            flex-basis: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">tamanho normal</div>
        <div class="item">tamanho um pouco maior</div>
        <div class="item">tamanho maior do que o do anterior</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">um tamanho pra testar a quebra de linha</div>

    </div>
</body>
</html>
