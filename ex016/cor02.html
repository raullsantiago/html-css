<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{/* configuração globais das css */
            height: 100%;

        }
        body {
            background-image: linear-gradient( 20deg, #EC6747 25%, #FA8F21, #A3399B 40%, #D52E80, #E24B61);
            background-attachment: fixed;
        }
  </style>
</head>
<body>
    <h1>Teste de gradiente</h1>
    <p>ola mundo!</p>

    
</body>
</html>
