<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        div.container {
            background-color: lightgreen;
            display: flex;

            flex-flow: row nowrap;

        }

        div.item {
            background-color: lightblue;
            text-align: center;
            border: 1px solid black;
            
            
        }

        div#cxA {
            /*flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 200px;*/ 

            flex: 2 0 auto;  
        }

        div#cxB {
            /*flex-grow: 3;
            flex-shrink: 1;
            flex-basis: 200px;*/
            
            flex: 1 4 auto;
        }

        div#cxC {
           /*flex-grow: 1;
           flex-shrink: 1;
           flex-basis: 200px;*/
           
           flex: 1 1 100px;
        }
    </style>
</head>
<body>
    <div class="container">
       
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    
    </div>
</body>
